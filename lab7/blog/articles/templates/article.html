<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
</head>
<body class="article">
    <div class="header">
        <img src="{{ STATIC_URL }}img/dpb-logo.png" />
                <div class="auth-links">
            {% if user.is_authenticated %}
                <span>Привет, {{ user.username }}</span>
                <a href="/logout/">Выйти</a>
            {% else %}
                <a href="/signup/">Зарегистрироваться</a>
                <a href="/login/">Войти</a>
            {% endif %}
        </div>
    </div>
    <div class="one-post">
        <h2 class="post-title">{{ post.title }}</h2>
        <div class="article-info">
            <div class="article-author">{{ post.author.username }}</div>
            <div class="article-created-date">{{ post.created_date }}</div>
        </div>
        <p class="article-text">{{ post.text }}</p>
    </div>
    <p class="back-link"><a href="/">Все записи</a></p>
</body>
</html>
